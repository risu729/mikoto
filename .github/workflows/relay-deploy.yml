name: Relay Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-production
  cancel-in-progress: false
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.11
        env:
          MISE_ENABLE_TOOLS: bun,node
      - name: Install dependencies
        run: mise deps
      - name: Deploy relay
        uses: risu729/wrangler-deploy-action@1931853e55842e31150badd8bf886fd08c134d57 # zizmor: ignore[stale-action-refs] action PR #5 is not tagged yet
        with:
          mode: production
          working-directory: packages/relay
          config: wrangler.jsonc
          environment: production
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
