name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  validate:
    name: CI
    permissions:
      actions: read # actions-timeline reads workflow run metadata
      contents: read # CI jobs check out the repository
    uses: ./.github/workflows/ci.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  release:
    name: Release
    needs:
      - validate
    if: github.ref == 'refs/heads/main' && github.repository_owner == 'risu729'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: write # semantic-release creates tags and GitHub releases
      id-token: write # actions/attest obtains a certificate for build provenance
      attestations: write # actions/attest publishes build provenance
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Install dependencies
        run: mise deps
      - name: Release
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Detect release assets
        id: release-assets
        run: |
          if compgen -G "dist/release/*" > /dev/null; then
            echo "created=true" >> "${GITHUB_OUTPUT}"
          fi
      - name: Attest release asset build provenance
        if: steps.release-assets.outputs.created == 'true'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/release/*
