name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref) }}
  cancel-in-progress: true
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Run lint
        run: mise run check --lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Test
        run: mise run test
  relay-test:
    name: Relay Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Relay tests
        run: mise //packages/relay:test
  docs-deploy:
    name: Docs Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
        env:
          MISE_ENABLE_TOOLS: bun,node
      - name: Store dependency versions
        id: dependency-versions
        run: |
          playwright_version="$(bun pm ls | sed -nE 's/.*playwright@(.+)/\1/p' | head -n 1)"
          echo "playwright=${playwright_version}" >> "${GITHUB_OUTPUT}"
      - name: Cache Playwright Chromium
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.dependency-versions.outputs.playwright }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
      - name: Build docs
        run: mise //packages/docs:build
      - name: Deploy docs
        if: github.event_name != 'workflow_dispatch'
        uses: risu729/wrangler-deploy-action@a282705ddae16c69574bfe62cdda8cef47f963cb # v1.1.0
        with:
          mode: ${{ github.event_name == 'pull_request' && 'preview-or-dry-run' || 'production' }}
          working-directory: packages/docs
          config: wrangler.jsonc
          preview-alias: pr-${{ github.event.pull_request.number }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  relay-deploy-dry-run:
    name: Relay Deploy Dry Run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
        env:
          MISE_ENABLE_TOOLS: bun,node
      - name: Install dependencies
        run: mise deps
      - name: Dry-run relay deploy
        uses: risu729/wrangler-deploy-action@a282705ddae16c69574bfe62cdda8cef47f963cb # v1.1.0
        with:
          mode: dry-run
          working-directory: packages/relay
          config: wrangler.jsonc
          environment: production
  ci-check:
    name: CI Check
    needs:
      - lint
      - test
      - relay-test
      - docs-deploy
      - relay-deploy-dry-run
    if: ${{ !cancelled() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - run: exit 1
  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # Required by actions-timeline to read this workflow run's jobs.
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
