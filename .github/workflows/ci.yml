name: CI
on:
  pull_request:
    branches:
      - main
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
  workflow_dispatch:
concurrency:
  group: ci-${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref) }}
  cancel-in-progress: true
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Run lint
        run: mise run check --lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Test
        run: mise run test
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: linux-x64
            bridge_binary: ./dist/mikoto-bridge-linux-x64
            codex_binary: ./dist/mikoto-codex-mcp-linux-x64
          - name: macOS arm64
            runner: macos-latest
            target: macos-arm64
            bridge_binary: ./dist/mikoto-bridge-macos-arm64
            codex_binary: ./dist/mikoto-codex-mcp-macos-arm64
          - name: Windows x64
            runner: windows-latest
            target: windows-x64
            bridge_binary: ./dist/mikoto-bridge-windows-x64.exe
            codex_binary: ./dist/mikoto-codex-mcp-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Compile binaries
        if: runner.os != 'Windows'
        run: |
          mise //packages/bridge:compile --target "${COMPILE_TARGET}"
          mise //packages/codex-mcp:compile --target "${COMPILE_TARGET}"
        env:
          COMPILE_TARGET: ${{ matrix.target }}
      - name: Smoke test binaries
        if: runner.os != 'Windows'
        run: |
          for binary in "${BRIDGE_BINARY}" "${CODEX_BINARY}"; do
            test -f "${binary}"
            test "$("${binary}" --version)" = "0.0.0-development"
          done
        env:
          BRIDGE_BINARY: ${{ matrix.bridge_binary }}
          CODEX_BINARY: ${{ matrix.codex_binary }}
      - name: Compile binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mise //packages/bridge:compile --target $env:COMPILE_TARGET
          mise //packages/codex-mcp:compile --target $env:COMPILE_TARGET
        env:
          COMPILE_TARGET: ${{ matrix.target }}
      - name: Smoke test binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($Binary in @($env:BRIDGE_BINARY, $env:CODEX_BINARY)) {
            if (-not (Test-Path -PathType Leaf $Binary)) {
              throw "Expected binary does not exist: $Binary"
            }
            $Version = & $Binary --version
            if ($Version -ne "0.0.0-development") {
              throw "Unexpected binary version from ${Binary}: $Version"
            }
          }
        env:
          BRIDGE_BINARY: ${{ matrix.bridge_binary }}
          CODEX_BINARY: ${{ matrix.codex_binary }}
  relay-test:
    name: Relay Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Relay tests
        run: mise //packages/relay:test
  docs-deploy:
    name: Docs Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
        env:
          MISE_ENABLE_TOOLS: bun,node
      - name: Store dependency versions
        id: dependency-versions
        run: |
          playwright_version="$(bun pm ls | sed -nE 's/.*playwright@(.+)/\1/p' | head -n 1)"
          echo "playwright=${playwright_version}" >> "${GITHUB_OUTPUT}"
      - name: Cache Playwright Chromium
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.dependency-versions.outputs.playwright }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
      - name: Build docs
        run: mise //packages/docs:build
      - name: Deploy docs
        if: github.event_name != 'workflow_dispatch'
        uses: risu729/wrangler-deploy-action@a282705ddae16c69574bfe62cdda8cef47f963cb # v1.1.0
        with:
          mode: ${{ github.event_name == 'pull_request' && 'preview-or-dry-run' || 'production' }}
          working-directory: packages/docs
          config: wrangler.jsonc
          preview-alias: pr-${{ github.event.pull_request.number }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  relay-deploy-dry-run:
    name: Relay Deploy Dry Run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
        env:
          MISE_ENABLE_TOOLS: bun,node
      - name: Install dependencies
        run: mise deps
      - name: Dry-run relay deploy
        uses: risu729/wrangler-deploy-action@a282705ddae16c69574bfe62cdda8cef47f963cb # v1.1.0
        with:
          mode: dry-run
          working-directory: packages/relay
          config: wrangler.jsonc
          environment: production
  ci-check:
    name: CI Check
    needs:
      - lint
      - test
      - build
      - relay-test
      - docs-deploy
      - relay-deploy-dry-run
    if: ${{ !cancelled() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - run: exit 1
  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # Required by actions-timeline to read this workflow run's jobs.
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
