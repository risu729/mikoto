#:schema https://mise.jdx.dev/schema/mise.json

monorepo_root = true

[monorepo]
config_roots = [
	"packages/bridge",
	"packages/codex-mcp",
	"packages/docs",
	"packages/relay",
]

[tools]
bun = "1.3.14"
node = "26.5.0"
wrangler = "4.106.0"
"npm:typescript" = "7.0.1-rc"
hk = "1.48.0"
oxlint = "1.72.0"
oxfmt = "0.57.0"
actionlint = "1.7.12"
# required for actionlint
shellcheck = "0.11.0"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.26.1"
tombi = "1.2.0"
rumdl = "v0.2.30"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.28"
yamllint = "1.38.0"
typos = "1.48.0"

[settings]
experimental = true

[settings.npm]
package_manager = "bun"

[deps.bun]
auto = true
sources = ["package.json", "bun.lock", "packages/*/package.json"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[tasks.test]
description = "Run repository Vitest tests."
run = "bunx vitest run"

[tasks.check]
description = "Run hk linters and formatters."
depends = ["//packages/relay:generate-types"]
usage = '''
flag "--lint" help="Run hk check instead of fix"
'''
run = "hk {% if usage.lint %}check{% else %}fix{% endif %} --all --no-progress --no-fail-fast"

[tasks.compile]
description = "Compile all local binaries."
run = [
	"mise //packages/codex-mcp:compile --target linux-x64",
	"mise //packages/codex-mcp:compile --target windows-x64",
	"mise //packages/bridge:compile --target linux-x64",
	"mise //packages/bridge:compile --target windows-x64",
]
