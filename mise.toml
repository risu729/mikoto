#:schema https://mise.jdx.dev/schema/mise.json

min_version = "2026.6.13"
monorepo_root = true

[monorepo]
config_roots = [
	"packages/bridge",
	"packages/codex-mcp",
	"packages/docs",
	"packages/relay",
]

[tools]
bun = "1.3.14"
node = "26.3.1"
wrangler = "4.105.0"
"npm:typescript" = "6.0.3"
hk = "1.48.0"
oxlint = "1.70.0"
oxfmt = "0.55.0"
actionlint = "1.7.12"
# required for actionlint
shellcheck = "0.11.0"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.26.1"
tombi = "1.1.5"
rumdl = "v0.2.22"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.24"
yamllint = "1.38.0"
typos = "1.47.2"

[settings]
experimental = true

[settings.npm]
package_manager = "bun"

[deps.bun]
auto = true
sources = ["package.json", "bun.lock", "packages/*/package.json"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[tasks.test]
description = "Run repository Vitest tests."
run = "bunx vitest run"

[tasks.typecheck]
description = "Typecheck the workspace."
run = "bunx tsc -p tsconfig.json"

[tasks.check]
description = "Run hk linters and formatters."
usage = '''
flag "--lint" help="Run hk check instead of fix"
'''
run = "hk {% if usage.lint %}check{% else %}fix{% endif %} --all --no-progress --no-fail-fast"
env.GH_TOKEN = "{% if env.GITHUB_TOKEN is defined %}{{ env.GITHUB_TOKEN }}{% endif %}"

[tasks.compile]
description = "Compile all local binaries."
depends = ["//packages/codex-mcp:compile", "//packages/bridge:compile"]
