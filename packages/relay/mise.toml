#:schema https://mise.jdx.dev/schema/mise.json

[tasks.test]
description = "Run Cloudflare Worker relay tests."
depends = ["generate-types"]
run = "bunx vitest run"

[tasks."generate-types"]
description = "Generate Cloudflare Worker runtime and binding types."
run = "wrangler types worker-configuration.d.ts"

[tasks.dev]
description = "Run the relay Worker locally with Wrangler."
run = "wrangler dev"

[tasks.deploy]
description = "Deploy the relay Worker with Wrangler."
run = "wrangler deploy"

[tasks."deploy:production"]
description = "Deploy the relay Worker production environment with Wrangler."
run = "wrangler deploy --env production"
