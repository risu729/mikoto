#:schema https://mise.jdx.dev/schema/mise.json

[tasks.run]
description = "Run the local bridge scaffold."
run = "bun src/index.ts"

[tasks.compile]
description = "Compile the local bridge for a target platform."
usage = '''
flag "--target <target>" help="Target platform: linux-x64 or windows-x64"
'''
run = '''
case "{{ usage.target }}" in
  linux-x64)
    bun_target="bun-linux-x64"
    outfile="../../dist/mikoto-bridge-linux-x64"
    ;;
  windows-x64)
    bun_target="bun-windows-x64"
    outfile="../../dist/mikoto-bridge-windows-x64.exe"
    ;;
  *)
    echo "Unsupported target: {{ usage.target }}. Use linux-x64 or windows-x64." >&2
    exit 2
    ;;
esac

bun build --compile --target="${bun_target}" --outfile="${outfile}" src/index.ts
'''
