#:schema https://mise.jdx.dev/schema/mise.json

[tasks.run]
description = "Run the Codex MCP scaffold."
run = "bun src/index.ts"

[tasks."generate-app-server-types"]
description = "Generate reference Codex app-server TypeScript protocol files."
tools = { codex = "latest" }
run = "codex app-server generate-ts --out ../../.generated/codex-app-server"

[tasks.compile]
description = "Compile the Codex MCP app for a target platform."
usage = '''
flag "--target <target>" help="Target platform: linux-x64 or windows-x64"
'''
run = '''
case "{{ usage.target }}" in
  linux-x64)
    bun_target="bun-linux-x64"
    outfile="../../dist/codex-mcp-app-linux-x64"
    ;;
  windows-x64)
    bun_target="bun-windows-x64"
    outfile="../../dist/codex-mcp-app-windows-x64.exe"
    ;;
  *)
    echo "Unsupported target: {{ usage.target }}. Use linux-x64 or windows-x64." >&2
    exit 2
    ;;
esac

bun build --compile --target="${bun_target}" --outfile="${outfile}" src/index.ts
'''
